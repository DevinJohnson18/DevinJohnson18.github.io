<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="structure.css">
    <!-- Skills Page of Devin Johnson's online portfolio -->
    <style>
    #Experience {
      font-size: 4rem;
    }
    #skillHolder {
      font-size: 3em;
      margin: 5%;
      text-align: center;
    }
    ul {
      font-size: 1.5rem;
    }
    li {
      padding: 5px;
    }
    .skillContainer {
      margin: auto;
      background-color: #323232;
      width: 100%;
      border-radius: 10px;
    }
    .skill {
      background-color: #C20F08;
      padding: 3px;
      border-radius: 10px;
    }
    .skillText { font-size: 0.75em; text-align: left; }
    .MySkills {
      display: inline;
      background-color: #262626;
      color: #19CACA;
      border-radius: 10px;
      padding: 10px;
    }
    .html { width: 45%; }
    .python { width: 65%; }
    </style>
    <title>Devin Johnson | Skills</title>
  </head>
  <body>
    <div id="container">  <!-- Start container -->
      <header>
        <a href=index.html>
          <div id="logo"><img src="images/logodj.png" alt="Devin Johnson"></div>
        </a>
      </header>

      <nav>  <!-- Start nav -->
        <div id="sidenav">
          <div id="a-holder">
            <a href="index.html">Home</a>
            <a href="work.html">Work</a>
            <a href="about.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>
      </nav>  <!-- End nav -->

      <div id="content"> <!-- Start content -->
        <div class="LeftScreen">
          <h1 id="Experience">Experience</h1>
          <ul>
            <li>10+ Years computer hardware technician.</li>
            <li>Indian Hills Computer Software Development student.</li>
            <li>Minor understanding of electronics.</li>
          </ul>
        </div>
        <aside class="RightScreen">
          <div id="skillHolder">
            <h1 class="MySkills">Skills</h1>

            <p class="skillText">Python</p>
            <div class="skillContainer">
              <div class="skill python"></div>
            </div>

            <p class="skillText">HTML</p>
            <div class="skillContainer">
              <div class="skill html"></div>
            </div>

          </div>
        </aside>
      </div><!-- End content -->

    </div> <!-- End container -->
  </body>
</html>
